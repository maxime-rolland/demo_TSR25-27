name: glpi_docker_dev

services:
  glpi:
    image: glpi/glpi:latest
    restart: "no"
    volumes:
      # Using a named volume avoids permission issues on host (automatically managed by Docker)
      - glpi_data:/var/glpi
    environment:
      - GLPI_DB_HOST=db
      - GLPI_DB_NAME=glpi
      - GLPI_DB_USER=glpi
      - GLPI_DB_PASSWORD=glpi
      - GLPI_DB_PORT=3306
      - GLPI_INSTALL_MODE=DOCKER
    ports:
      - "8080:80"
    depends_on:
      - db

  glpi-webhook-relay:
    image: python:3.13-alpine
    container_name: glpi-webhook-relay
    restart: unless-stopped
    command: python3 /app/relay.py
    volumes:
      - ./glpi-integration/relay:/app:ro
    env_file:
      - .env
    environment:
      # Port 80, not 8080: GLPI's outbound-webhook SSRF allowlist regex
      # (Toolbox::isUrlSafe) has no port-matching group at all, so any
      # webhook target URL containing an explicit :port is unconditionally
      # rejected as "unsafe" before GLPI even attempts the request. Using
      # the default HTTP port keeps the target URL port-free.
      - RELAY_LISTEN_PORT=80
      - RELAY_TARGET_URL=http://host.docker.internal:8644/webhooks/glpi-ticket
    extra_hosts:
      - "host.docker.internal:host-gateway"   # so the relay can reach Hermes on the host

  db:
    image: mariadb:latest
    restart: "no"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: glpi
      MYSQL_USER: glpi
      MYSQL_PASSWORD: glpi
    volumes:
      - db_data:/var/lib/mysql

  hermes-glpi:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-glpi
    restart: unless-stopped
    command: gateway run
    network_mode: host   # so HERMES_DASHBOARD_HOST=127.0.0.1 is the host's own loopback
    volumes:
      - ./.hermes-work:/opt/data
      - ./glpi-integration/skills/glpi-ticket-triage:/opt/data/skills/devops/glpi-ticket-triage:ro
    env_file:
      - .env
    environment:
      - HERMES_DASHBOARD=1
      - HERMES_DASHBOARD_HOST=127.0.0.1
      - GATEWAY_ALLOW_ALL_USERS=true

volumes:
  glpi_data:
  db_data:
